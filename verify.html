<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vérification d’Affiliation FHSA</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f4f7fb;
  color:#0b1f3a;
}
.card{
  max-width:700px;
  margin:50px auto;
  background:white;
  padding:35px;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.12);
  text-align:center;
  border-top:8px solid #0b3d91;
}
h1{
  color:#0b3d91;
  font-size:28px;
  margin-bottom:5px;
}
.subtitle{
  color:#b8860b;
  font-weight:bold;
  margin-bottom:25px;
}
.status{
  font-size:32px;
  font-weight:bold;
  margin:25px 0;
}
.active{color:#008000;}
.suspended{color:#d97706;}
.expired,.inactive{color:#c00000;}
.info{
  text-align:left;
  margin-top:25px;
  line-height:1.8;
  font-size:16px;
}
.footer{
  margin-top:30px;
  font-size:13px;
  color:#555;
  border-top:1px solid #ddd;
  padding-top:15px;
}
.badge{
  display:inline-block;
  padding:8px 16px;
  border-radius:30px;
  background:#eef3ff;
  color:#0b3d91;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
  <div class="badge">Vérification officielle</div>

  <h1>Fédération Haïtienne de Sauvetage Aquatique</h1>
  <div class="subtitle">Certificat d’Affiliation</div>

  <div id="result">Chargement...</div>

  <div class="footer">
    Ce certificat est valide uniquement après vérification via ce lien officiel.
  </div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const id = (urlParams.get("id") || "").trim().toUpperCase();

// 🔴 RANPLASE AK LINK CSV OU
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT5dIFEnBdOcnCuI2an3gCe6NSjWHOg6wxNVok6aKXvQhunbvElcShsCMcqpio5SSoIjlD3QLFReLj3/pub?gid=0&single=true&output=csv";

fetch(sheetURL)
  .then(res => res.text())
  .then(data => {
    const rows = data.trim().split(/\r?\n/).slice(1);
    let found = false;

    rows.forEach(row => {
      const cols = row.split(",").map(c => c.replaceAll('"', '').trim());

      const ref = cols[0];
      const club = cols[1];
      const sig = cols[2];
      const annee = cols[3];
      const statut = cols[4];
      const emission = cols[5];
      const expiration = cols[6];
      const federation = cols[7];

      const rowId = (sig + "-" + annee).trim().toUpperCase();

      if(rowId === id){
        found = true;

        let statusClass = "inactive";
        if(statut.toUpperCase() === "ACTIF") statusClass = "active";
        if(statut.toUpperCase() === "SUSPENDU") statusClass = "suspended";
        if(statut.toUpperCase() === "EXPIRÉ") statusClass = "expired";

        document.getElementById("result").innerHTML = `
          <h2>${club}</h2>
          <div class="status ${statusClass}">${statut}</div>

          <div class="info">
            <strong>Référence certificat :</strong> ${ref}<br>
            <strong>Sigle :</strong> ${sig}<br>
            <strong>Année :</strong> ${annee}<br>
            <strong>Date d’émission :</strong> ${emission}<br>
            <strong>Date d’expiration :</strong> ${expiration}<br>
            <strong>Fédération :</strong> ${federation}
          </div>
        `;
      }
    });

    if(!found){
      document.getElementById("result").innerHTML =
        "<h2 style='color:red'>Certificat non trouvé</h2>";
    }
  });
</script>

</body>
</html>
