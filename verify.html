<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FHSA Vérification</title>
</head>

<body style="font-family: Arial; text-align:center; padding:40px;">

<h1>VÉRIFICATION D’AFFILIATION</h1>

<div id="result">Chargement...</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get('id');

// 🔴 RANPLASE AK LINK CSV OU
const sheetURL = "https://docs.google.com/spreadsheets/d/1Tg573HDqxxxxPmaXoTzmMNdVyIWGwPy-CQx_cDF_5g/export?format=csv&gid=0";

fetch(sheetURL)
  .then(res => res.text())
  .then(data => {
    const rows = data.split("\n");

    let found = false;

    rows.forEach(row => {
 const cols = row.split(",").map(c => c.trim());

      const club = cols[1];
      const sig = cols[2];
      const annee = cols[3];
      const statut = cols[4];

    if((sig.trim() + "-" + annee.trim()) === id.trim()){
        found = true;

        let color = "green";
        if(statut !== "ACTIF") color = "red";

        document.getElementById("result").innerHTML = `
          <h2>${club}</h2>
          <p>Année: ${annee}</p>
          <h2 style="color:${color}">${statut}</h2>
        `;
      }
    });

    if(!found){
      document.getElementById("result").innerHTML =
        "<h2 style='color:red'>Club non trouvé</h2>";
    }
  });
</script>

</body>
</html>
