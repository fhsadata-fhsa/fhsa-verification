<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vérification d’Affiliation FHSA</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f4f7fb;
  color:#0b1f3a;
}
.card{
  max-width:700px;
  margin:50px auto;
  background:white;
  padding:35px;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.12);
  text-align:center;
  border-top:8px solid #0b3d91;
}
h1{
  color:#0b3d91;
  font-size:28px;
  margin-bottom:5px;
}
.subtitle{
  color:#b8860b;
  font-weight:bold;
  margin-bottom:25px;
}
.status{
  font-size:32px;
  font-weight:bold;
  margin:25px 0;
}
.active{color:#008000;}
.suspended{color:#d97706;}
.expired,.inactive{color:#c00000;}
.info{
  text-align:left;
  margin-top:25px;
  line-height:1.8;
  font-size:16px;
}
.footer{
  margin-top:30px;
  font-size:13px;
  color:#555;
  border-top:1px solid #ddd;
  padding-top:15px;
}
.badge{
  display:inline-block;
  padding:8px 16px;
  border-radius:30px;
  background:#eef3ff;
  color:#0b3d91;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
  <div class="badge">Vérification officielle</div>

  <h1>Fédération Haïtienne de Sauvetage Aquatique</h1>
  <div class="subtitle">Certificat d’Affiliation</div>

  <div id="result">Chargement...</div>

  <div class="footer">
    Ce certificat est valide uniquement après vérification via ce lien officiel.
  </div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const id = (urlParams.get("id") || "").trim().toUpperCase();

// 🔴 RANPLASE AK LINK CSV OU
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT5dIFEnBdOcnCuI2an3gCe6NSjWHOg6wxNVok6aKXvQhunbvElcShsCMcqpio5SSoIjlD3QLFReLj3/pub?gid=0&single=true&output=csv";

fetch(sheetURL)
  .then(res => res.text())
  .then(data => {
    const rows = data.trim().split(/\r?\n/).slice(1);
    let found = false;

    rows.forEach(row => {
      const cols = row.split(",").map(c => c.replaceAll('"', '').trim());

      const ref = cols[0];
      const club = cols[1];
      const sig = cols[2];
      const annee = cols[3];
      const paiement = cols[4];
      const montant = cols[5];
      const datePaiement = cols[6];
      const statut = cols[7];
      const statutAffiche = cols[8];
      const dateEmission = cols[9];
      const dateExpiration = cols[10];
      const federation = cols[11];

      const rowId = `${sig}-${annee}`.trim().toUpperCase();

      if (rowId === id) {
        found = true;

        const statusText = (statutAffiche || statut).toUpperCase();

        let color = "#c00000";
        let message = "Cette affiliation n’est pas active.";

        if (statusText === "ACTIF") {
          color = "#008000";
          message = "Cette affiliation est valide et active.";
        }

        if (statusText === "SUSPENDU") {
          color = "#d97706";
          message = "Cette affiliation est suspendue. Veuillez contacter la fédération.";
        }

        if (statusText === "EXPIRÉ") {
          color = "#c00000";
          message = "Désolé, cette affiliation est expirée. Veuillez régulariser le paiement afin d’être réactivé.";
        }

        document.getElementById("result").innerHTML = `
          <h2>${club}</h2>
          <h3 style="color:${color}; font-size:32px;">${statusText}</h3>
          <p>${message}</p>

          <p><strong>Référence :</strong> ${ref}</p>
          <p><strong>Sigle :</strong> ${sig}</p>
          <p><strong>Année :</strong> ${annee}</p>
          <p><strong>Paiement :</strong> ${paiement}</p>
          <p><strong>Montant :</strong> ${montant} USD</p>
          <p><strong>Date paiement :</strong> ${datePaiement}</p>
          <p><strong>Date d’émission :</strong> ${dateEmission}</p>
          <p><strong>Date d’expiration :</strong> ${dateExpiration}</p>
          <p><strong>Fédération :</strong> ${federation}</p>
        `;
      }
    });

    if (!found) {
      document.getElementById("result").innerHTML =
        "<h2 style='color:red'>Certificat non trouvé</h2>";
    }
  });
</script>

</body>
</html>
